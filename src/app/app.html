<div class="min-h-screen bg-slate-50 font-sans text-slate-900 pb-20 md:pb-0">
  <!-- Navbar -->
  <nav class="sticky top-0 z-50 border-b border-slate-200 bg-white/80 backdrop-blur-md">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-3 sm:px-6 lg:px-8">
      <div class="flex items-center gap-2">
        <div class="flex h-10 w-10 items-center justify-center rounded-xl bg-emerald-600 text-white shadow-lg shadow-emerald-200">
          <mat-icon>eco</mat-icon>
        </div>
        <span class="text-xl font-bold tracking-tight text-slate-900">GreenTrack <span class="text-emerald-600">AI</span></span>
      </div>

      <div class="hidden items-center gap-6 md:flex">
        <a routerLink="/" routerLinkActive="text-emerald-600" [routerLinkActiveOptions]="{exact: true}" class="text-sm font-medium text-slate-600 transition-colors hover:text-emerald-600">Dashboard</a>
        <a routerLink="/map" routerLinkActive="text-emerald-600" class="text-sm font-medium text-slate-600 transition-colors hover:text-emerald-600">Waste Map</a>
        <a routerLink="/leaderboard" routerLinkActive="text-emerald-600" class="text-sm font-medium text-slate-600 transition-colors hover:text-emerald-600">Leaderboard</a>
      </div>

      <div class="flex items-center gap-3">
        @if (authService.profile(); as profile) {
          <div class="flex items-center gap-3 rounded-full border border-slate-200 bg-slate-50 p-1 pr-4">
            <img [src]="profile.photoURL" [alt]="profile.displayName" class="h-8 w-8 rounded-full object-cover" referrerpolicy="no-referrer">
            <div class="flex flex-col">
              <span class="text-xs font-bold leading-none">{{ profile.displayName }}</span>
              <span class="text-[10px] font-medium text-emerald-600 uppercase tracking-wider">Level {{ profile.level }}</span>
            </div>
          </div>
          <button (click)="authService.logout()" class="flex h-10 w-10 items-center justify-center rounded-full text-slate-400 transition-colors hover:bg-slate-100 hover:text-slate-600">
            <mat-icon>logout</mat-icon>
          </button>
        } @else {
          <button (click)="authService.login()" class="flex items-center gap-2 rounded-xl bg-slate-900 px-5 py-2.5 text-sm font-semibold text-white transition-all hover:bg-slate-800 active:scale-95">
            <mat-icon class="scale-90">login</mat-icon>
            Sign In
          </button>
        }
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8">
    <router-outlet />
  </main>

  <!-- Mobile Bottom Nav -->
  <div class="fixed bottom-0 left-0 right-0 z-50 border-t border-slate-200 bg-white px-4 py-2 md:hidden">
    <div class="flex items-center justify-around">
      <a routerLink="/" routerLinkActive="text-emerald-600" [routerLinkActiveOptions]="{exact: true}" class="flex flex-col items-center gap-1 text-slate-400">
        <mat-icon>dashboard</mat-icon>
        <span class="text-[10px] font-medium">Home</span>
      </a>
      <a routerLink="/map" routerLinkActive="text-emerald-600" class="flex flex-col items-center gap-1 text-slate-400">
        <mat-icon>map</mat-icon>
        <span class="text-[10px] font-medium">Map</span>
      </a>
      <div class="relative -top-6">
        <a routerLink="/report" class="flex h-14 w-14 items-center justify-center rounded-full bg-emerald-600 text-white shadow-xl shadow-emerald-200 ring-4 ring-white transition-transform active:scale-90">
          <mat-icon>add_a_photo</mat-icon>
        </a>
      </div>
      <a routerLink="/leaderboard" routerLinkActive="text-emerald-600" class="flex flex-col items-center gap-1 text-slate-400">
        <mat-icon>emoji_events</mat-icon>
        <span class="text-[10px] font-medium">Rank</span>
      </a>
      <button class="flex flex-col items-center gap-1 text-slate-400">
        <mat-icon>person</mat-icon>
        <span class="text-[10px] font-medium">Profile</span>
      </button>
    </div>
  </div>
</div>
